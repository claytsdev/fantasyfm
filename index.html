<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FantasyFM — Launching Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0f14;
    --accent:  #9b4dff;
    --txt:     #e8eaf0;
    --txt2:    #8b90a8;
    --txt3:    #555b72;
    --border:  #1e2230;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--txt);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(155,77,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(155,77,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: drift 18s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes drift {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 0 48px, 48px 0; }
  }

  .glow-blob {
    position: fixed;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(ellipse at center, rgba(155,77,255,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: pulse 5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
  }

  .stage {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .logo-wrap {
    opacity: 0;
    transform: translateY(-16px);
    animation: fadeUp 0.7s ease forwards 0.2s;
  }
  .logo-img {
    height: clamp(52px, 9vw, 80px);
    width: auto;
  }

  .badge {
    display: inline-block;
    margin-top: 20px;
    padding: 4px 16px;
    border-radius: 100px;
    border: 1px solid var(--accent);
    background: rgba(155,77,255,0.1);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--accent);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }

  .divider {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 32px auto;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 0.75s;
  }

  .launch-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--txt3);
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.9s;
  }
  .launch-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--txt);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.05s;
    line-height: 1.15;
  }
  .launch-date .time {
    display: block;
    font-size: clamp(18px, 3.5vw, 28px);
    font-weight: 400;
    color: var(--txt2);
    margin-top: 6px;
  }

  .tagline {
    margin-top: 36px;
    font-size: 13px;
    color: var(--txt3);
    font-weight: 300;
    letter-spacing: 0.3px;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 1.3s;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
