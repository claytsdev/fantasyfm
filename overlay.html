<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FantasyFM Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: transparent;
  font-family: 'Barlow Condensed', sans-serif;
  width: 800px;
}
body { padding: 0; }

.overlay-wrap {
  background: rgba(8, 8, 14, 0.93);
  border: 1.5px solid rgba(155, 77, 255, 0.45);
  border-radius: 14px;
  overflow: hidden;
  backdrop-filter: blur(16px);
  box-shadow: 0 12px 48px rgba(0,0,0,0.75), 0 0 0 1px rgba(155,77,255,0.1) inset;
  margin: 12px;
  width: calc(100% - 24px);
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 16px;
  background: linear-gradient(135deg, rgba(155,77,255,0.22) 0%, rgba(155,77,255,0.08) 100%);
  border-bottom: 1px solid rgba(155, 77, 255, 0.25);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo-text { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; color: #fff; text-transform: uppercase; line-height: 1; }
.logo-text span { color: #9b4dff; }

.live-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,90,90,0.18); border: 1px solid rgba(255,90,90,0.35);
  border-radius: 5px; padding: 3px 8px;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #ff5a5a;
  animation: pulse 1.4s ease-in-out infinite;
}
.live-text { font-size: 10px; font-weight: 600; color: #ff5a5a; letter-spacing: 1.2px; text-transform: uppercase; }

@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.75); } }

.session-code {
  font-size: 12px; font-weight: 600; color: #9b4dff; letter-spacing: 1.5px;
  background: rgba(155, 77, 255, 0.12); padding: 4px 10px; border-radius: 5px;
  border: 1px solid rgba(155, 77, 255, 0.3);
}

.table-header {
  display: flex; align-items: center; padding: 8px 16px;
  border-bottom: 1px solid rgba(155, 77, 255, 0.15);
  background: rgba(155, 77, 255, 0.05);
}
.th-rank { width: 40px; font-size: 10px; font-weight: 700; color: #555b72; text-transform: uppercase; letter-spacing: 0.8px; }
.th-name { flex: 1; font-size: 10px; font-weight: 700; color: #555b72; text-transform: uppercase; letter-spacing: 0.8px; }
.th-cap { width: 120px; font-size: 10px; font-weight: 700; color: #555b72; text-transform: uppercase; letter-spacing: 0.8px; }
.th-pts { width: 55px; text-align: right; font-size: 10px; font-weight: 700; color: #555b72; text-transform: uppercase; letter-spacing: 0.8px; }

.player-row {
  display: flex; align-items: center; padding: 9px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.3s;
}
.player-row:last-child { border-bottom: none; }
.rank-1 { background: rgba(245, 200, 66, 0.06); }
.rank-2 { background: rgba(154, 160, 184, 0.04); }
.rank-3 { background: rgba(205, 122, 58, 0.04); }

.rank { width: 40px; font-size: 16px; font-weight: 900; }
.r1 { color: #f5c842; }
.r2 { color: #9aa0b8; }
.r3 { color: #cd7a3a; }

.name { flex: 1; font-size: 16px; font-weight: 700; color: #e8eaf0; }
.cap-name { width: 120px; font-size: 12px; color: #8b90a8; }
.pts { width: 55px; text-align: right; font-size: 22px; font-weight: 900; color: #8b90a8; }
.pts.top { color: #9b4dff; }
.pts-change { animation: flash 0.6s ease; }
@keyframes flash { 0%,100% { color: inherit; } 50% { color: #4aff91; text-shadow: 0 0 12px #4aff91; } }

.plat-badge {
  font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
  margin-left: 5px; letter-spacing: 0.5px; vertical-align: middle;
}
.plat-tw { background: rgba(145,70,255,0.2); color: #9146ff; }
.plat-yt { background: rgba(255,0,0,0.2); color: #ff4444; }

.empty {
  padding: 20px 16px;
  font-size: 14px; color: #555b72; text-align: center;
}

.footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  border-top: 1px solid rgba(255,255,255,0.04);
  background: rgba(0,0,0,0.2);
}
.footer-info { font-size: 11px; color: #555b72; font-weight: 600; }
.url-hint { font-size: 10px; color: #3a3e52; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="overlay-wrap">
  <div class="header">
    <div class="header-left">
      <div class="logo-text">Fantasy<span>FM</span></div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <div class="live-text">Live</div>
      </div>
    </div>
    <div class="session-code" id="session-display">--</div>
  </div>
  <div class="table-header">
    <div class="th-rank">#</div>
    <div class="th-name">Manager</div>
    <div class="th-cap">★ Captain</div>
    <div class="th-pts">Pts</div>
  </div>
  <div id="leaderboard">
    <div class="empty">Waiting for players to join...</div>
  </div>
  <div class="footer">
    <div class="footer-info" id="viewer-count">0 managers</div>
    <div class="url-hint">fantasyfm.io</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const SESSION = params.get('session') || '';
const MAX_ROWS = parseInt(params.get('rows') || '8');

if (SESSION) document.getElementById('session-display').textContent = SESSION;

let prevScores = {};
let eventsCache = [];

// Correct scoring: events filtered by lockedAtTs
function getScore(playerName, events, lockedTs) {
  return events
    .filter(e => e.player_name === playerName && (e._ts || 0) > lockedTs)
    .reduce((s, e) => s + Number(e.points), 0);
}

// Full viewer score with correct captain logic (mirrors js/scoring.js)
function calcViewerScore(v, events) {
  const lockedTs = Number(v.events_at_lock) || 0;
  const banked = Number(v.banked_points) || 0;
  let current = 0;
  const picks = { DEF: v.pick_def, MID: v.pick_mid, ATT: v.pick_att, CAP: v.pick_cap };
  if (picks.DEF) {
    const pts = getScore(picks.DEF, events, lockedTs);
    current += picks.CAP === picks.DEF ? pts * 2 : pts;
  }
  if (picks.MID) {
    const pts = getScore(picks.MID, events, lockedTs);
    current += picks.CAP === picks.MID ? pts * 2 : pts;
  }
  if (picks.ATT) {
    const pts = getScore(picks.ATT, events, lockedTs);
    current += picks.CAP === picks.ATT ? pts * 2 : pts;
  }
  if (picks.CAP && picks.CAP !== picks.DEF && picks.CAP !== picks.MID && picks.CAP !== picks.ATT) {
    current += getScore(picks.CAP, events, lockedTs) * 2;
  }
  return banked + current;
}

async function fetchData() {
  if (!SESSION) return;
  try {
    const [eventsRes, viewersRes] = await Promise.all([
      fetch('/.netlify/functions/claude', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get_events', payload: { session_id: SESSION } }),
      }),
      fetch('/.netlify/functions/claude', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get_viewers', payload: { session_id: SESSION } }),
      }),
    ]);

    const events = await eventsRes.json();
    const viewers = await viewersRes.json();
    if (!Array.isArray(events) || !Array.isArray(viewers)) return;

    // Annotate events with ms timestamp
    const annotatedEvents = events.map(e => ({ ...e, _ts: new Date(e.created_at).getTime() }));

    const leaderboard = viewers
      .filter(v => v.locked)
      .map(v => ({
        name: v.viewer_name,
        pts: calcViewerScore(v, annotatedEvents),
        cap: v.pick_cap || null,
        platform: v.platform || 'manual',
      }))
      .sort((a, b) => b.pts - a.pts)
      .slice(0, MAX_ROWS);

    renderLeaderboard(leaderboard);
    const locked = viewers.filter(v => v.locked).length;
    document.getElementById('viewer-count').textContent = `${locked} manager${locked !== 1 ? 's' : ''}`;
  } catch(e) { console.error(e); }
}

function renderLeaderboard(lb) {
  const el = document.getElementById('leaderboard');
  if (!lb.length) { el.innerHTML = '<div class="empty">Waiting for players to join...</div>'; return; }
  el.innerHTML = lb.map((v, i) => {
    const rankCls = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const rowCls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
    const plat = v.platform === 'twitch'
      ? '<span class="plat-badge plat-tw">TW</span>'
      : v.platform === 'youtube'
      ? '<span class="plat-badge plat-yt">YT</span>' : '';
    const changed = prevScores[v.name] !== undefined && prevScores[v.name] !== v.pts;
    const capShort = v.cap ? v.cap.split(' ').slice(-1)[0] : '—';
    return `<div class="player-row ${rowCls}">
      <div class="rank ${rankCls}">${medal}</div>
      <div class="name">${v.name}${plat}</div>
      <div class="cap-name">${v.cap ? '★ ' + capShort : '—'}</div>
      <div class="pts ${i < 3 ? 'top' : ''} ${changed ? 'pts-change' : ''}">${v.pts}</div>
    </div>`;
  }).join('');
  lb.forEach(v => { prevScores[v.name] = v.pts; });
}

fetchData();
setInterval(fetchData, 4000);
</script>
</body>
</html>
